- { id: nodert.perf.sab-bundle, title: "zero-copy SAB bundle — workers skip per-spawn disk+decompress", area: nodert, status: shipped, level: tested, since: "2026-07", spec: "node-host-engine §8.1", notes: "host decompresses the node-lib bundle once (cached) into a SharedArrayBuffer, shared zero-copy with every worker (Node+browser); ~14% off Node cold runs (48→41ms). Measured: nodert ~41ms cold = ~68x faster than the VM (~2.8s); bundle transfer negligible (0.36ms) so worker-spawn+boot is the floor. Warm-pool is the next lever (isolation tradeoff)" }

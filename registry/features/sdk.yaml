- { id: sdk.engines.config, title: "engines config — createNano({ engines: { node, routing } })", area: sdk, status: shipped, since: "2026-07", spec: "node-host-engine §14", notes: "vm/nodert/auto policy + routing pins; nodert host-engine runtime VENDORED into the SDK (src/vendor/nodert, byte-identical mirror gated by check-vendor; copied to dist/vendor on build) and wired to Nano.node() over the shared Kernel/VFS. auto falls back to the VM on ERR_NODERT_UNSUPPORTED or if the runtime is unreachable. Tested: Nano.node('nodert') runs on the host engine through the built dist. Browser worker-bundle path (pass the node-lib bundle in init) is the remaining terminal integration." }
- { id: sdk.engines.nodert, title: "nodert host-engine tier live in the SDK (K9)", area: sdk, status: shipped, since: "2026-07", spec: "node-host-engine §14 (K9)", notes: "vendored nodert runs Node on the browser JS engine over the shared Kernel; cross-tier VFS both directions verified headlessly (worker_threads); node-lib bundle ships in dist/vendor/nodert" }
- { id: sdk.engines.nodert.browser, title: "nodert browser boot — bundle-in-init (host-loaded, no fs/brotli)", area: sdk, status: partial, since: "2026-07", spec: "node-host-engine §8.2 (K9-browser)", notes: "host loadLibBundle (Node: disk+brotli / browser: fetch+DecompressionStream gzip via a .gz sibling) passes libIndex/libBytes/fixtures in the worker init; worker boots via initFromBytes. gzip==brotli byte-identity + boot-from-bytes verified headlessly. E2E SCAFFOLD landed: site-root loader candidate + e2e:fixtures stages dist/vendor→public/vendor + harness boot({engines}) + 22-nodert.spec.ts (boots WITHOUT a node ELF so any node output proves the host engine). vite build green; live browser run is CI (test:e2e). Terminal UI toggle remaining" }
- { id: sdk.catalog.tiers, title: "execution-tier catalog metadata (SignedIndex.appMeta + Tier)", area: sdk, status: shipped, since: "2026-07", notes: "ArtifactKind += node-app/boa-app; Tier type + kindToTier()/manifestTier(); SignedIndex.appMeta (per-app {tier,kind,abi}, denormalized). Re-exported through the public entry; typecheck + build green. Consumed by the terminal's runner-aware catalog. NOT yet republished to npm (0.2.5 lacks it; terminal uses the local @sdk alias)" }
